<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Mobil Tank Oyunu</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #111;
      overflow: hidden;
      font-family: Arial, sans-serif;
      touch-action: none;
    }
    canvas {
      display: block;
    }
    #ui {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      color: white;
      text-align: center;
      pointer-events: none;
      font-size: 24px;
      text-shadow: 2px 2px 4px black;
    }
    #score {
      top: 10px;
      position: absolute;
      width: 100%;
      font-size: 28px;
    }
  </style>
</head>
<body>

<div id="score">Skor: 0</div>
<div id="ui">Ekrana dokun → Tank hareket eder</div>

<canvas id="c"></canvas>

<script>
// ====================== OYUN KODU ======================
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const scoreEl = document.getElementById("score");

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

let score = 0;
let gameOver = false;

// Tank
const tank = {
  x: W/2,
  y: H/2,
  angle: 0,
  speed: 0,
  maxSpeed: 3.2,
  rotSpeed: 0.08,
  size: 38,
  color: "#4CAF50"
};

// Mermiler
let bullets = [];
const bulletSpeed = 9;

// Düşmanlar
let enemies = [];
let lastEnemy = 0;
const enemyInterval = 1800; // ms

// Dokunmatik hedef
let touchTarget = {x:0, y:0, active:false};

function spawnEnemy() {
  const side = Math.floor(Math.random()*4);
  let x,y;
  if(side === 0) { x = Math.random()*W; y = -40; }     // üst
  else if(side === 1) { x = W+40; y = Math.random()*H; } // sağ
  else if(side === 2) { x = Math.random()*W; y = H+40; } // alt
  else { x = -40; y = Math.random()*H; }                 // sol

  enemies.push({
    x, y,
    angle: Math.atan2(tank.y - y, tank.x - x),
    speed: 1.1 + Math.random()*0.8,
    size: 32,
    color: "#f44336"
  });
}

function dist(x1,y1,x2,y2) {
  const dx = x2-x1, dy = y2-y1;
  return Math.sqrt(dx*dx + dy*dy);
}

function loop() {
  ctx.fillStyle = "#222";
  ctx.fillRect(0,0,W,H);

  // Tank hareketi
  if (touchTarget.active) {
    const dx = touchTarget.x - tank.x;
    const dy = touchTarget.y - tank.y;
    const targetAngle = Math.atan2(dy, dx);

    // Dönme
    let diff = targetAngle - tank.angle;
    while (diff > Math.PI) diff -= Math.PI*2;
    while (diff < -Math.PI) diff += Math.PI*2;

    if (Math.abs(diff) > 0.04) {
      tank.angle += diff > 0 ? tank.rotSpeed : -tank.rotSpeed;
    }

    // İleri git
    const distance = dist(tank.x, tank.y, touchTarget.x, touchTarget.y);
    if (distance > 40) {
      tank.x += Math.cos(tank.angle) * tank.maxSpeed;
      tank.y += Math.sin(tank.angle) * tank.maxSpeed;
    }
  }

  // Tank çiz
  ctx.save();
  ctx.translate(tank.x, tank.y);
  ctx.rotate(tank.angle);
  ctx.fillStyle = tank.color;
  ctx.fillRect(-tank.size/2, -tank.size/3, tank.size, tank.size*2/3); // gövde
  ctx.fillStyle = "#2E7D32";
  ctx.fillRect(-tank.size/3, -tank.size/2, tank.size*2/3, tank.size); // kule
  ctx.restore();

  // Mermi at (otomatik)
  if (touchTarget.active && Math.random() < 0.18) {
    bullets.push({
      x: tank.x + Math.cos(tank.angle)*tank.size*0.7,
      y: tank.y + Math.sin(tank.angle)*tank.size*0.7,
      vx: Math.cos(tank.angle) * bulletSpeed,
      vy: Math.sin(tank.angle) * bulletSpeed,
      life: 80
    });
  }

  // Mermileri güncelle & çiz
  for (let i = bullets.length-1; i>=0; i--) {
    const b = bullets[i];
    b.x += b.vx;
    b.y += b.vy;
    b.life--;

    ctx.fillStyle = "#ffeb3b";
    ctx.beginPath();
    ctx.arc(b.x, b.y, 6, 0, Math.PI*2);
    ctx.fill();

    if (b.life <= 0 || b.x<0 || b.x>W || b.y<0 || b.y>H) {
      bullets.splice(i,1);
      continue;
    }
  }

  // Düşmanlar
  if (Date.now() - lastEnemy > enemyInterval) {
    spawnEnemy();
    lastEnemy = Date.now();
  }

  for (let i = enemies.length-1; i>=0; i--) {
    const e = enemies[i];

    // Tank'a doğru hareket
    const dx = tank.x - e.x;
    const dy = tank.y - e.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d > 1) {
      e.x += (dx/d) * e.speed;
      e.y += (dy/d) * e.speed;
      e.angle = Math.atan2(dy, dx);
    }

    // Çarpışma kontrolü (tank-düşman)
    if (dist(tank.x, tank.y, e.x, e.y) < tank.size*0.8 + e.size*0.8) {
      gameOver = true;
    }

    // Mermi çarpışma
    for (let j = bullets.length-1; j>=0; j--) {
      const b = bullets[j];
      if (dist(b.x, b.y, e.x, e.y) < e.size*0.9) {
        enemies.splice(i,1);
        bullets.splice(j,1);
        score += 10;
        scoreEl.textContent = "Skor: " + score;
        break;
      }
    }

    // Düşman çiz
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.rotate(e.angle);
    ctx.fillStyle = e.color;
    ctx.fillRect(-e.size/2, -e.size/3, e.size, e.size*2/3);
    ctx.fillStyle = "#b71c1c";
    ctx.fillRect(-e.size/4, -e.size/2, e.size/2, e.size);
    ctx.restore();
  }

  if (gameOver) {
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = "white";
    ctx.font = "bold 60px Arial";
    ctx.textAlign = "center";
    ctx.fillText("GAME OVER", W/2, H/2 - 40);
    ctx.font = "32px Arial";
    ctx.fillText("Skor: " + score, W/2, H/2 + 20);
    ctx.fillText("Yeniden oynamak için sayfayı yenile", W/2, H/2 + 80);
  }

  requestAnimationFrame(loop);
}

// Dokunmatik kontroller
canvas.addEventListener("touchstart", e => {
  e.preventDefault();
  if (gameOver) return;
  const t = e.touches[0];
  touchTarget.x = t.clientX;
  touchTarget.y = t.clientY;
  touchTarget.active = true;
});

canvas.addEventListener("touchmove", e => {
  e.preventDefault();
  if (gameOver) return;
  const t = e.touches[0];
  touchTarget.x = t.clientX;
  touchTarget.y = t.clientY;
});

canvas.addEventListener("touchend", e => {
  touchTarget.active = false;
});

// Başlat
loop();
</script>
</body>
</html>
